function wireChatEvents() {
  const input = document.getElementById('chat-input');
  const btn   = document.getElementById('chat-send');
  if (!input || !btn) return;

  btn.addEventListener('click', sendChatMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendChatMessage();
  });
}

async function sendChatMessage() {
  if (chatStreaming) return;
  const input = document.getElementById('chat-input');
  const btn   = document.getElementById('chat-send');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  chatMessages.push({ role: 'user', content: text });
  appendChatBubble('user', text);

  chatStreaming = true;
  btn.disabled = true;
  const bubble = appendChatBubble('assistant', '', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatMessages, context: chatContext })
    });

    if (!res.ok) {
      const contentType = res.headers.get('content-type') || '';
      let errorMsg;
      if (res.status === 404 || !contentType.includes('json')) {
        errorMsg = 'Chat requires the local server — run: node server.js';
      } else {
        const err = await res.json().catch(() => ({}));
        errorMsg = err.error || 'Something went wrong.';
      }
      bubble.textContent = errorMsg;
      bubble.classList.add('error');
      bubble.classList.remove('streaming');
      chatMessages.pop(); // remove failed user message
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let assistantText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;

        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.text) {
            assistantText += evt.delta.text;
            bubble.innerHTML = formatChat(assistantText);
            scrollChatToBottom();
          }
        } catch (_) {}
      }
    }

    bubble.classList.remove('streaming');
    if (assistantText) {
      chatMessages.push({ role: 'assistant', content: assistantText });
      // Show unread dot if user is on Data tab
      const chatTab = document.querySelector('.panel-tab[data-tab="chat"]');
      if (chatTab && !chatTab.classList.contains('active')) {
        const dot = document.getElementById('chat-unread-dot');
        if (dot) dot.classList.add('visible');
      }
    }
  } catch (err) {
    bubble.textContent = 'Could not connect — run: node server.js';
    bubble.classList.add('error');
    bubble.classList.remove('streaming');
  } finally {
    chatStreaming = false;
    btn.disabled = false;
    input.focus();
  }
}

function appendChatBubble(role, text, isStreaming) {
  const container = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = `chat-msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${role}${isStreaming ? ' streaming' : ''}`;
  bubble.textContent = text;
  msg.appendChild(bubble);
  container.appendChild(msg);
  scrollChatToBottom();
  return bubble;
}

function formatChat(text) {
  // Escape HTML, then convert double newlines to paragraph breaks
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.replace(/\n\n+/g, '<br><br>').replace(/\n/g, '<br>');
}

function scrollChatToBottom() {
  const container = document.getElementById('chat-messages');
  if (container) container.scrollTop = container.scrollHeight;
}

// ── Compare mode ─────────────────────────────────────────
function enterCompare() {
  if (!lastShownData) return;
  compareMode = true;
  compareActive = false;

  // Store current selection as A
  const d = lastShownData;
  compareA = {
    micro: d.micro, board: d.board, meta: d.meta,
    microName: d.microName, boardName: d.boardName,
    region: d.region, subdistrict: d.subdistrict, boardNum: d.boardNum
  };

  // Transfer existing highlights to compare-A highlights
  if (highlightMicro) { map.removeLayer(highlightMicro); highlightMicro = null; }
  if (highlightBoard) { map.removeLayer(highlightBoard); highlightBoard = null; }

  // Draw A in teal
  const showMicro = document.getElementById('toggle-micro').checked;
  const showBoards = document.getElementById('toggle-boards').checked;
  if (compareA.micro && showMicro) {
    highlightMicroA = L.geoJSON(compareA.micro, {
      style: { color: '#0f766e', weight: 2.5, fillColor: '#14b8a6', fillOpacity: 0.30 }
    }).addTo(map);
  }
  if (compareA.board && showBoards) {
    highlightBoardA = L.geoJSON(compareA.board, {
      style: { color: '#0f766e', weight: 1.5, fillOpacity: 0, dashArray: '5 4' }
    }).addTo(map);
  }

  showCompareAwaiting();
}

function showCompareAwaiting() {
  const aName = compareA.microName !== '—' ? compareA.microName : compareA.boardName;
  const html = `
    <div class="compare-banner">
      <span class="compare-banner-text">Comparing: ${aName} vs …</span>
      <button class="compare-banner-close" onclick="exitCompare()" title="Exit compare">&times;</button>
    </div>
    <div class="compare-awaiting">
      <div class="compare-awaiting-card">
        <div class="result-label">Selection A</div>
        <div class="result-value">${aName}</div>
        ${compareA.region !== '—' ? `<div class="result-sub">${compareA.region}</div>` : ''}
      </div>
      <div class="compare-awaiting-prompt">
        Pick a second neighborhood to compare — click the map, search an address, or browse below.
      </div>
      ${browseComboHTML()}
    </div>
  `;
  showPanel(html);
  wireBrowseCombo();
}

function completeCompare(micro, board, meta) {
  const microName   = micro ? micro.properties.neighborho : '—';
  const boardName   = board ? board.properties.towns      : '—';
  const region      = micro ? micro.properties.region     : '—';
  const subdistrict = board ? board.properties.sd_desc    : '—';
  const boardNum    = board ? board.properties.board_num  : '—';

  // Same neighborhood check
  const aName = compareA.microName !== '—' ? compareA.microName : compareA.boardName;
  const bName = microName !== '—' ? microName : boardName;
  if (aName === bName && aName !== '—') {
    // Stay in awaiting state, flash a message
    showCompareAwaiting();
    const panel = document.querySelector('.compare-awaiting');
    if (panel) {
      const notice = document.createElement('div');
      notice.className = 'compare-same-board';
      notice.textContent = 'That\'s the same neighborhood! Pick a different one.';
      panel.insertBefore(notice, panel.querySelector('.browse-combo'));
      setTimeout(() => notice.remove(), 3000);
    }
    return;
  }

  compareB = { micro, board, meta, microName, boardName, region, subdistrict, boardNum };
  compareActive = true;

  drawCompareHighlights();
  fitMapToBothNeighborhoods();
  showComparePanel();
}

function drawCompareHighlights() {
  // Clear any existing highlights
  if (highlightMicro) { map.removeLayer(highlightMicro); highlightMicro = null; }
  if (highlightBoard) { map.removeLayer(highlightBoard); highlightBoard = null; }
  if (highlightMicroA) { map.removeLayer(highlightMicroA); highlightMicroA = null; }
  if (highlightBoardA) { map.removeLayer(highlightBoardA); highlightBoardA = null; }
  if (highlightMicroB) { map.removeLayer(highlightMicroB); highlightMicroB = null; }
  if (highlightBoardB) { map.removeLayer(highlightBoardB); highlightBoardB = null; }

  const showMicro = document.getElementById('toggle-micro').checked;
  const showBoards = document.getElementById('toggle-boards').checked;

  // A = teal
  if (compareA.micro && showMicro) {
    highlightMicroA = L.geoJSON(compareA.micro, {
      style: { color: '#0f766e', weight: 2.5, fillColor: '#14b8a6', fillOpacity: 0.30 }
    }).addTo(map);
  }
  if (compareA.board && showBoards) {
    highlightBoardA = L.geoJSON(compareA.board, {
      style: { color: '#0f766e', weight: 1.5, fillOpacity: 0, dashArray: '5 4' }
    }).addTo(map);
  }

  // B = orange
  if (compareB.micro && showMicro) {
    highlightMicroB = L.geoJSON(compareB.micro, {
      style: { color: '#b45309', weight: 2.5, fillColor: '#f59e0b', fillOpacity: 0.30 }
    }).addTo(map);
  }
  if (compareB.board && showBoards) {
    highlightBoardB = L.geoJSON(compareB.board, {
      style: { color: '#b45309', weight: 1.5, fillOpacity: 0, dashArray: '5 4' }
    }).addTo(map);
  }
}

function fitMapToBothNeighborhoods() {
  const layers = [highlightMicroA, highlightBoardA, highlightMicroB, highlightBoardB].filter(Boolean);
  if (!layers.length) return;
  let bounds = layers[0].getBounds();
  for (let i = 1; i < layers.length; i++) {
    bounds = bounds.extend(layers[i].getBounds());
  }
  map.fitBounds(bounds, { padding: [48, 48], maxZoom: 14 });
}

function showComparePanel() {
  const aName = compareA.microName !== '—' ? compareA.microName : compareA.boardName;
  const bName = compareB.microName !== '—' ? compareB.microName : compareB.boardName;

  const chatAvailable = !isStaticHost;

  // Data pane for B
  const bDataHTML = buildDataHTML(compareB);

  // Compare tab
  const compareTabHTML = buildCompareTabHTML(compareA, compareB);

  // Chat pane
  let chatPaneHTML = '';
  if (chatAvailable) {
    chatMessages = [];
    chatContext = buildDualChatContext(compareA, compareB);

    chatPaneHTML = `
      <div class="tab-pane tab-pane-chat" id="pane-chat">
        <div class="chat-context-badge dual">
          <span class="chat-context-dot a"></span>
          <span class="chat-context-name">${aName}</span>
          <span class="chat-context-vs">vs</span>
          <span class="chat-context-dot b"></span>
          <span class="chat-context-name">${bName}</span>
        </div>
        <div class="chat-section">
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Compare these neighborhoods..." autocomplete="off">
            <button id="chat-send">Send</button>
          </div>
          <div class="chat-messages" id="chat-messages">
            <div class="chat-msg assistant">
              <div class="chat-bubble assistant">Hi! I have data on both ${aName} and ${bName}. Ask me anything — lifestyle, schools, commute, cost of living — I'll compare them for you.</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  const html = `
    <div class="compare-banner">
      <span class="compare-banner-text">${aName} vs ${bName}</span>
      <button class="compare-banner-close" onclick="exitCompare()" title="Exit compare">&times;</button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab" data-tab="data">Data</button>
      <button class="panel-tab active" data-tab="compare">Compare</button>
      ${chatAvailable ? '<button class="panel-tab" data-tab="chat">Chat<span class="chat-unread" id="chat-unread-dot"></span></button>' : ''}
    </div>
    <div class="tab-pane tab-pane-data" id="pane-data">
      ${bDataHTML}
    </div>
    <div class="tab-pane tab-pane-compare active" id="pane-compare">
      ${compareTabHTML}
    </div>
    ${chatPaneHTML}
  `;

  showPanel(html);
  wireTabSwitching();
  if (chatAvailable) wireChatEvents();
}

function buildCompareTabHTML(a, b) {
  const aName = a.microName !== '—' ? a.microName : a.boardName;
  const bName = b.microName !== '—' ? b.microName : b.boardName;
  const sameBoard = a.boardNum !== '—' && b.boardNum !== '—' && a.boardNum === b.boardNum;

  let html = `
    <div class="compare-legend">
      <div class="compare-legend-item"><span class="compare-legend-dot a"></span>${aName}</div>
      <div class="compare-legend-item"><span class="compare-legend-dot b"></span>${bName}</div>
    </div>
  `;

  if (sameBoard) {
    html += `<div class="compare-same-board">Both neighborhoods are in Board #${a.boardNum} (${a.boardName}) — demographics below are identical at the board level.</div>`;
  }

  const metrics = [
    {
      label: 'Median HH Income',
      valA: a.meta ? a.meta.median_household_income : null,
      valB: b.meta ? b.meta.median_household_income : null,
      fmt: v => '$' + (v / 1000).toFixed(0) + 'k'
    },
    {
      label: 'Population',
      valA: a.meta ? a.meta.population : null,
      valB: b.meta ? b.meta.population : null,
      fmt: v => v.toLocaleString()
    },
    {
      label: 'Owner Occupied',
      valA: a.meta ? a.meta.owner_occupancy_rate : null,
      valB: b.meta ? b.meta.owner_occupancy_rate : null,
      fmt: v => Math.round(v * 100) + '%'
    },
    {
      label: 'Avg HH Size',
      valA: a.meta ? a.meta.avg_household_size : null,
      valB: b.meta ? b.meta.avg_household_size : null,
      fmt: v => String(v)
    },
    {
      label: 'Housing Units',
      valA: a.meta ? a.meta.housing_units : null,
      valB: b.meta ? b.meta.housing_units : null,
      fmt: v => v.toLocaleString()
    },
    {
      label: 'Households',
      valA: a.meta ? a.meta.households : null,
      valB: b.meta ? b.meta.households : null,
      fmt: v => v.toLocaleString()
    }
  ];

  for (const m of metrics) {
    const hasA = m.valA != null;
    const hasB = m.valB != null;
    const maxVal = Math.max(hasA ? m.valA : 0, hasB ? m.valB : 0);
    const pctA = maxVal > 0 && hasA ? (m.valA / maxVal * 100) : 0;
    const pctB = maxVal > 0 && hasB ? (m.valB / maxVal * 100) : 0;
    const winnerA = hasA && hasB && m.valA > m.valB;
    const winnerB = hasA && hasB && m.valB > m.valA;

    html += `
      <div class="compare-metric">
        <div class="compare-metric-label">${m.label}</div>
        <div class="compare-bar-row">
          <div class="compare-bar-item">
            <span class="compare-bar-val${winnerA ? ' winner' : ''}">${hasA ? m.fmt(m.valA) : '—'}</span>
            <div class="compare-bar-track">
              <div class="compare-bar-fill a" style="width:${pctA}%"></div>
            </div>
          </div>
          <div class="compare-bar-item">
            <span class="compare-bar-val${winnerB ? ' winner' : ''}">${hasB ? m.fmt(m.valB) : '—'}</span>
            <div class="compare-bar-track">
              <div class="compare-bar-fill b" style="width:${pctB}%"></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  html += `<div class="compare-source">DPP / ACS 2019–2023 · Board-level estimates</div>`;
  return html;
}

function buildDualChatContext(a, b) {
  const sameBoard = a.boardNum !== '—' && b.boardNum !== '—' && a.boardNum === b.boardNum;
  function buildSide(n) {
    const mkt = n.region !== '—' ? marketData[n.region] : null;
    return {
      microName: n.microName !== '—' ? n.microName : null,
      region: n.region !== '—' ? n.region : null,
      boardName: n.boardName !== '—' ? n.boardName : null,
      subdistrict: n.subdistrict !== '—' ? n.subdistrict : null,
      boardNum: n.boardNum !== '—' ? n.boardNum : null,
      demographics: n.meta ? {
        population: n.meta.population,
        medianIncome: n.meta.median_household_income,
        ownerOccupancy: n.meta.owner_occupancy_rate,
        avgHouseholdSize: n.meta.avg_household_size,
        housingUnits: n.meta.housing_units,
        households: n.meta.households
      } : null,
      market: mkt ? {
        medianSalePrice: mkt.medianSalePrice,
        daysOnMarket: mkt.medianDaysOnMarket,
        activeListings: mkt.activeListings,
        soldLast30: mkt.soldLast30,
        priceTrendPct: mkt.priceTrendPct,
        heatLabel: mkt.heatLabel
      } : null
    };
  }
  return {
    compareMode: true,
    sameBoard,
    neighborhoodA: buildSide(a),
    neighborhoodB: buildSide(b)
  };
}

function exitCompare() {
  compareMode = false;
  compareActive = false;
  compareA = null;
  compareB = null;

  // Clear compare highlights
  if (highlightMicroA) { map.removeLayer(highlightMicroA); highlightMicroA = null; }
  if (highlightBoardA) { map.removeLayer(highlightBoardA); highlightBoardA = null; }
  if (highlightMicroB) { map.removeLayer(highlightMicroB); highlightMicroB = null; }
  if (highlightBoardB) { map.removeLayer(highlightBoardB); highlightBoardB = null; }

  // Restore last shown data if available
  if (lastShownData) {
    clearHighlights();
    const d = lastShownData;
    const showMicro = document.getElementById('toggle-micro').checked;
    const showBoards = document.getElementById('toggle-boards').checked;
    if (d.micro && showMicro) {
      highlightMicro = L.geoJSON(d.micro, {
        style: { color: '#0f766e', weight: 2.5, fillColor: '#14b8a6', fillOpacity: 0.35 }
      }).addTo(map);
      map.fitBounds(highlightMicro.getBounds(), { padding: [48, 48], maxZoom: 15 });
    }
    if (d.board && showBoards) {
      highlightBoard = L.geoJSON(d.board, {
        style: { color: '#1d4ed8', weight: 2.5, fillColor: '#3b82f6', fillOpacity: 0.15, dashArray: '6 4' }
      }).addTo(map);
    }
    showResults(d.micro, d.board, d.meta);
  } else {
    clearHighlights();
    showPlaceholder();
  }
}

// ── Event listeners ──────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('address-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.defaultPrevented) doSearch();
});

// Tooltip style injection
const style = document.createElement('style');
style.textContent = '.nb-tooltip { background: #0f172a; color: #f1f5f9; border: none; font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }';
document.head.appendChild(style);

// ── Boot ─────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
